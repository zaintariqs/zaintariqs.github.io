<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hawalay | حوالے</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f7f9;
      color: #333;
    }
    header {
      background: url('https://via.placeholder.com/1600x600?text=Crypto+POS+Terminal') center center / cover no-repeat;
      color: white;
      text-align: center;
      padding: 100px 20px 120px;
      position: relative;
    }
    header::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.6);
    }
    header h1, header h2, header p {
      position: relative;
      z-index: 2;
    }
    header h1 {
      font-size: 3rem;
      margin: 0;
    }
    header h2 {
      font-size: 1.8rem;
      font-family: 'Noto Nastaliq Urdu', serif;
      margin-top: 10px;
    }
    header p {
      font-size: 1.2rem;
      margin-top: 20px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }
    .container {
      max-width: 500px;
      margin: -60px auto 40px;

      margin-bottom: 20px;

      display: block;
